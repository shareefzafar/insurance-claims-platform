# ── TEST PROFILE ──────────────────────────────────────────────────────────────
# This file overrides application.properties when spring.profiles.active=test
# Testcontainers overrides spring.datasource.* via @DynamicPropertySource

# Use test RSA public key instead of calling real Keycloak
# Tests sign JWTs with the matching test-private.pem
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:test-public.pem
# Override issuer-uri — prevents Spring from calling Keycloak on startup
spring.security.oauth2.resourceserver.jwt.issuer-uri=

# Flyway disabled in tests — Testcontainers + schema.sql used instead
spring.flyway.enabled=false

# Hibernate creates schema for tests
spring.jpa.hibernate.ddl-auto=create-drop

# Notification channel for tests
notification.channel=email

logging.level.com.allianz.claims=DEBUG
logging.level.org.springframework.security=DEBUG
