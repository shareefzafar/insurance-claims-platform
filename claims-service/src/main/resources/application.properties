spring.application.name=claims-service
server.port=8080

# ── DATABASE ──────────────────────────────────────────────────────────────────
# URL injected at runtime from AWS Secrets Manager via ECS task definition
# Never hardcoded here
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/claims}
spring.datasource.username=${DB_USERNAME:claims_user}
spring.datasource.password=${DB_PASSWORD:claims_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── FLYWAY MIGRATIONS ─────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── SECURITY / OAUTH2 ─────────────────────────────────────────────────────────
# Production: Spring fetches public key from Keycloak JWKS endpoint
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:https://identity.allianz.com/realms/allianz}

# ── NOTIFICATION ──────────────────────────────────────────────────────────────
# Controls which NotificationStrategy bean is active (email | sms | sns)
notification.channel=email

# ── ACTUATOR ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── LOGGING ──────────────────────────────────────────────────────────────────
logging.level.com.allianz.claims=INFO
logging.level.org.springframework.security=WARN
