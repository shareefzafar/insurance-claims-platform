# Local profile: use in-memory H2 to allow running/debugging without PostgreSQL
spring.datasource.url=jdbc:h2:mem:claimsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# Disable Flyway for local profile to avoid PG-specific migrations
spring.flyway.enabled=false

# Logging
logging.level.org.springframework=INFO

