<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy Claims Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #0a3d62; --success: #27ae60; --danger: #c0392b;
      --warning: #f39c12; --neutral: #7f8c8d; --bg: #f4f6f9;
      --white: #ffffff; --border: #dde1e7; --shadow: 0 2px 8px rgba(0,0,0,.1);
      --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: #333; line-height: 1.6; }

    .claims-dashboard  { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .dashboard-header  { display: flex; justify-content: space-between;
                         align-items: center; margin-bottom: 24px; }
    .dashboard-header h1 { font-size: 1.75rem; color: var(--primary); }
    .dashboard-controls  { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }

    .claim-card        { background: var(--white); border: 1px solid var(--border);
                         border-radius: var(--radius); padding: 16px; cursor: pointer;
                         transition: box-shadow .2s, border-color .2s; }
    .claim-card:hover  { box-shadow: var(--shadow); border-color: var(--primary); }
    .claim-card--selected { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(10,61,98,.2); }
    .claim-card__header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .claim-card__amount { font-size: 1.25rem; font-weight: 600; color: var(--primary); margin: 8px 0; }
    .claim-card__actions { display: flex; gap: 8px; margin-top: 12px; }
    .claims-list       { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 16px; }

    .badge             { padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; }
    .badge--blue       { background: #ebf5fb; color: #2980b9; }
    .badge--yellow     { background: #fef9e7; color: #d35400; }
    .badge--green      { background: #eafaf1; color: #27ae60; }
    .badge--red        { background: #fdedec; color: #c0392b; }
    .badge--purple     { background: #f4ecf7; color: #8e44ad; }

    .btn               { padding: 8px 16px; border: none; border-radius: var(--radius);
                         cursor: pointer; font-size: .875rem; font-weight: 500; transition: opacity .2s; }
    .btn:hover         { opacity: .85; }
    .btn:disabled      { opacity: .4; cursor: not-allowed; }
    .btn--approve      { background: var(--success); color: var(--white); }
    .btn--reject       { background: var(--danger);  color: var(--white); }
    .btn--secondary    { background: var(--border);  color: #333; }

    .search-bar        { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
    .search-bar input  { flex: 1; padding: 8px 12px; border: 1px solid var(--border);
                         border-radius: var(--radius); font-size: .875rem; }
    .search-spinner    { width: 16px; height: 16px; border: 2px solid var(--border);
                         border-top-color: var(--primary); border-radius: 50%;
                         animation: spin .6s linear infinite; }
    .filter-bar select { padding: 8px 12px; border: 1px solid var(--border);
                         border-radius: var(--radius); font-size: .875rem; background: white; }

    .alert             { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 16px;
                         display: flex; align-items: center; gap: 12px; }
    .alert--error      { background: #fdedec; color: var(--danger); border: 1px solid #f5b7b1; }
    .alert--success    { background: #eafaf1; color: var(--success); border: 1px solid #a9dfbf; }
    .loading-overlay   { text-align: center; padding: 40px; color: var(--neutral); }
    .empty-state       { text-align: center; padding: 60px; color: var(--neutral); }
    .pagination        { display: flex; align-items: center; gap: 16px;
                         justify-content: center; margin-top: 24px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      .dashboard-controls { flex-direction: column; }
      .claims-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- ES modules — no build step required -->
  <script type="module" src="./app.js"></script>
</body>
</html>
