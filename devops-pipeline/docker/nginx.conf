# nginx.conf — policy-dashboard reverse proxy + security headers
#
# Routes:
#   /api/*    → claims-service backend (ECS service discovery)
#   /*        → static files (ES modules, HTML, CSS)

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── SECURITY HEADERS ──────────────────────────────────────────────────
    # Content-Security-Policy: restrict script sources
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    # X-Frame-Options: prevent clickjacking
    add_header X-Frame-Options          "SAMEORIGIN" always;
    # X-Content-Type-Options: prevent MIME sniffing
    add_header X-Content-Type-Options   "nosniff" always;
    # Referrer-Policy: don't leak URL in referrer header
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── GZIP COMPRESSION ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── API PROXY → claims-service ────────────────────────────────────────
    # In ECS: claims-service is reachable via ECS Service Discovery DNS
    # http://claims-service.cba-internal:8080
    location /api/ {
        proxy_pass         http://claims-service.cba-internal:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── STATIC FILES ─────────────────────────────────────────────────────
    # Cache JS/CSS for 1 year (they are fingerprinted in production)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA FALLBACK ─────────────────────────────────────────────────────
    # Serve index.html for any unmatched route (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── HEALTH CHECK ENDPOINT ─────────────────────────────────────────────
    # Used by ECS health checks — does not log (avoids log spam)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
