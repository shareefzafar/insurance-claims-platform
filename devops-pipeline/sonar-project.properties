# sonar-project.properties
# SonarQube / SonarCloud configuration for the CBA Claims Platform
# Both projects analysed — quality gates enforced in CI pipeline

# ── CLAIMS SERVICE (Java) ─────────────────────────────────────────────────────
sonar.projectKey=cba-claims-platform
sonar.projectName=CBA Claims Platform
sonar.projectVersion=1.0.0

# Java sources
sonar.modules=claims-service,policy-dashboard

claims-service.sonar.projectName=Claims Service
claims-service.sonar.projectBaseDir=claims-service
claims-service.sonar.sources=src/main/java
claims-service.sonar.tests=src/test/java
claims-service.sonar.java.binaries=target/classes
claims-service.sonar.java.test.binaries=target/test-classes
claims-service.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
claims-service.sonar.exclusions=\
    **/config/**,\
    **/dto/**,\
    **/*Application.java

# ── POLICY DASHBOARD (JavaScript) ───────────────────────────────────────────
policy-dashboard.sonar.projectName=Policy Dashboard
policy-dashboard.sonar.projectBaseDir=policy-dashboard
policy-dashboard.sonar.sources=src
policy-dashboard.sonar.tests=tests
policy-dashboard.sonar.javascript.lcov.reportPaths=coverage/lcov.info
policy-dashboard.sonar.exclusions=\
    node_modules/**,\
    coverage/**,\
    playwright-report/**,\
    dist/**

# ── QUALITY GATE (applies to both) ───────────────────────────────────────────
# Defined in SonarQube UI — build fails if gate not met:
#   Coverage on new code:    >= 80%
#   Duplicated lines:        <= 3%
#   Maintainability rating:  A
#   Reliability rating:      A
#   Security rating:         A
#   Security hotspots:       0 open
