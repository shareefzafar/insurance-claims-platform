# .github/workflows/ci.yml
# Real working CI pipeline — no AWS or SonarCloud needed to pass

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:

  build-java:
    name: Build — claims-service (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('claims-service/pom.xml') }}
      - name: Compile
        working-directory: claims-service
        run: mvn clean compile -q

  build-js:
    name: Build — policy-dashboard (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: policy-dashboard/package-lock.json
      - name: Install dependencies
        working-directory: policy-dashboard
        run: npm ci

  unit-tests-java:
    name: Unit Tests — JUnit 5 + Mockito
    runs-on: ubuntu-latest
    needs: build-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('claims-service/pom.xml') }}
      - name: Run unit tests
        working-directory: claims-service
        run: mvn test -q
      - name: Upload JaCoCo coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: java-coverage
          path: claims-service/target/site/jacoco/
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: java-test-results
          path: claims-service/target/surefire-reports/

  unit-tests-js:
    name: Unit Tests — Jest
    runs-on: ubuntu-latest
    needs: build-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: policy-dashboard/package-lock.json
      - name: Install dependencies
        working-directory: policy-dashboard
        run: npm ci
      - name: Run Jest unit tests
        working-directory: policy-dashboard
        run: npx jest --testPathPattern=tests/unit --coverage --ci
        env:
          NODE_OPTIONS: --experimental-vm-modules
      - name: Upload Jest coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: js-coverage
          path: policy-dashboard/coverage/

  e2e-tests:
    name: E2E Tests — Playwright
    runs-on: ubuntu-latest
    needs: unit-tests-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: policy-dashboard/package-lock.json
      - name: Install dependencies
        working-directory: policy-dashboard
        run: npm ci
      - name: Install Playwright browsers
        working-directory: policy-dashboard
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        working-directory: policy-dashboard
        run: npx playwright test --reporter=html,list
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: policy-dashboard/playwright-report/
          retention-days: 7

  owasp-scan:
    name: Security — OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: unit-tests-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('claims-service/pom.xml') }}
      - name: OWASP Dependency-Check
        working-directory: claims-service
        run: |
          mvn dependency-check:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=../devops-pipeline/owasp-suppressions.xml \
            -Dformat=HTML,JSON \
            -DnvdApiDelay=6000
        continue-on-error: true
      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: claims-service/target/dependency-check-report.*

  npm-audit:
    name: Security — npm audit
    runs-on: ubuntu-latest
    needs: build-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: policy-dashboard/package-lock.json
      - run: npm ci
        working-directory: policy-dashboard
      - name: npm audit
        working-directory: policy-dashboard
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build:
    name: Docker Build — verify images
    runs-on: ubuntu-latest
    needs: [unit-tests-java, unit-tests-js, e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build claims-service image
        run: |
          docker build \
            --file devops-pipeline/docker/Dockerfile.claims-service \
            --tag claims-service:${{ steps.sha.outputs.sha }} \
            --build-arg GIT_SHA=${{ steps.sha.outputs.sha }} \
            claims-service/
      - name: Build policy-dashboard image
        run: |
          docker build \
            --file devops-pipeline/docker/Dockerfile.policy-dashboard \
            --tag policy-dashboard:${{ steps.sha.outputs.sha }} \
            --build-arg GIT_SHA=${{ steps.sha.outputs.sha }} \
            policy-dashboard/
      - name: Verify images
        run: |
          docker images | grep claims-service
          docker images | grep policy-dashboard
          echo "SHA: ${{ steps.sha.outputs.sha }}"

  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [unit-tests-java, unit-tests-js, e2e-tests, docker-build]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Java Unit Tests   | ${{ needs.unit-tests-java.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JS Unit Tests     | ${{ needs.unit-tests-js.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Playwright E2E    | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build      | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
